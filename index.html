<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Word Grid Duel</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Raleway:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>

<body>

<div id="setup" class="screen active">
  <h1>Word Grid Duel</h1>

  <p class="rules">
    Players alternate placing letters of a 3-letter word.<br>
    Complete the word in a straight line to win.
  </p>

  <input id="word" maxlength="3" placeholder="3-letter word">

  <select id="size">
    <option value="3">3x3</option>
    <option value="4">4x4</option>
    <option value="5">5x5</option>
    <option value="6">6x6</option>
  </select>

  <select id="mode">
    <option value="pvp">Player vs Player</option>
    <option value="ai">Player vs AI</option>
  </select>

  <select id="difficulty">
    <option value="easy">Easy</option>
    <option value="medium">Medium</option>
    <option value="hard">Hard</option>
    <option value="unbeatable">Unbeatable</option>
  </select>

  <button id="start">Start Game</button>
</div>

<div id="game" class="screen">
  <div id="turn"></div>
  <div id="grid"></div>

  <div class="controls">
    <button id="again">Play Again</button>
    <button id="reset">Reset</button>
  </div>

  <div id="winner"></div>
</div>

<script src="script.js"></script>
</body>
</html>
