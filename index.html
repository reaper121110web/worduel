<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Word Grid Duel</title>

  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Raleway:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<div id="setup-screen" class="screen active">
  <h1>Word Grid Duel</h1>

  <div class="rules">
    <p>Alternate placing letters of a 3-letter word.</p>
    <p>Complete the word in any straight line to win.</p>
    <p>You can play vs Player or AI.</p>
  </div>

  <input id="word-input" type="text" maxlength="3" placeholder="Enter 3-letter word">

  <select id="grid-size">
    <option value="3">3x3</option>
    <option value="4">4x4</option>
    <option value="5">5x5</option>
    <option value="6">6x6</option>
    <option value="7">7x7</option>
    <option value="8">8x8</option>
  </select>

  <select id="mode">
    <option value="pvp">Player vs Player</option>
    <option value="ai">Player vs AI</option>
  </select>

  <button id="start-btn">Start Game</button>
</div>

<div id="game-screen" class="screen">
  <div id="scoreboard"></div>
  <div id="turn-indicator"></div>
  <div id="grid"></div>

  <div class="controls">
    <button id="play-again">Play Again</button>
    <button id="reset">Reset</button>
  </div>

  <div id="winner-display"></div>
</div>

<script src="script.js"></script>
</body>
</html>
